name: Quick Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quick-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run lightweight repository smoke test
        run: python tests/quick_test.py
